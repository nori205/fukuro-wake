<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>袋分け帳</title>
<meta name="description" content="予算封筒とカード封筒に分けて、クレカ購入時の移し忘れ・戻し忘れを防ぐ">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#25313A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="袋分け帳">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // window.storage は Claude アーティファクト専用APIなので、
  // 同じインターフェースを localStorage で肩代わりする。
  window.storage = {
    get: async (key) => ({ value: localStorage.getItem(key) }),
    set: async (key, value) => { localStorage.setItem(key, value); },
  };
</script>

<script type="text/jsx-source" id="app-source">
const { useState, useEffect } = React;

// ---------- 定数 ----------
const STORAGE_KEY = "fukuro-wake-data";
const EMPTY = { envelopes: [], purchases: [], adjustments: [], transactions: [] };

const C = {
  paper: "#F6F4EE",
  ink: "#25313A",
  inkSoft: "#5C6870",
  kraft: "#E3D5B8",
  kraftDeep: "#D3C09B",
  kraftLine: "#C4AE84",
  card: "#DCE7EC",
  cardDeep: "#C6D8E0",
  cardLine: "#9FB9C6",
  shu: "#C43D2E",
  shuBg: "#FBEDEA",
  green: "#2F6B4F",
  greenBg: "#EAF2ED",
  blue: "#2D5A78",
  blueBg: "#E9F0F5",
  line: "#DDD8CB",
  white: "#FFFFFF",
};

const yen = (n) => "¥" + Number(n || 0).toLocaleString("ja-JP");
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const fmtDate = (iso) => {
  const d = new Date(iso);
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};
const fmtDay = (iso) => {
  const d = new Date(iso);
  return `${d.getMonth() + 1}/${d.getDate()}`;
};
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

function FukuroWake() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("envelopes"); // envelopes | purchases | adjust | history
  const [modal, setModal] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);

  // ---------- 読み込み(旧データからの移行を含む) ----------
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          if (parsed && Array.isArray(parsed.envelopes)) {
            const needsMigration = parsed.envelopes.length > 0 && parsed.envelopes[0].group === undefined;
            if (needsMigration) {
              // 旧バージョン(封筒1種類・購入は別記録)からの移行:
              // 封筒の名前と残高だけ引き継ぎ、予算封筒として再スタートする。
              setData({
                envelopes: parsed.envelopes.map((e) => ({
                  id: e.id || uid(), name: e.name, group: "budget", balance: e.balance || 0,
                })),
                purchases: [], adjustments: [], transactions: [],
              });
              return;
            }
            setData({
              envelopes: parsed.envelopes,
              purchases: parsed.purchases || [],
              adjustments: parsed.adjustments || [],
              transactions: parsed.transactions || [],
            });
            return;
          }
        }
      } catch (e) {
        // キーが無いだけなら初期データで開始
      }
      setData(EMPTY);
    })();
  }, []);

  // ---------- 保存つき更新 ----------
  const update = async (fn) => {
    const next = fn(JSON.parse(JSON.stringify(data)));
    setData(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  };

  // ---------- 操作: 封筒 ----------
  const addEnvelope = (name, group) =>
    update((d) => {
      d.envelopes.push({ id: uid(), name, group, balance: 0 });
      return d;
    });

  const deleteEnvelope = (envId) =>
    update((d) => {
      d.envelopes = d.envelopes.filter((e) => e.id !== envId);
      d.adjustments = d.adjustments.filter(
        (a) => a.done || (a.fromEnvId !== envId && a.toEnvId !== envId)
      );
      return d;
    });

  const editEnvelope = (envId, name, balance) =>
    update((d) => {
      const env = d.envelopes.find((e) => e.id === envId);
      if (!env) return d;
      env.name = name;
      const delta = balance - env.balance;
      if (delta !== 0) {
        d.transactions.unshift({
          id: uid(), type: delta > 0 ? "deposit" : "withdraw", envId, envName: name,
          amount: Math.abs(delta), memo: "残高を直接修正", date: new Date().toISOString(),
        });
      }
      env.balance = balance;
      return d;
    });

  const budgetDeposit = (envId, amount, memo) =>
    update((d) => {
      const env = d.envelopes.find((e) => e.id === envId);
      if (!env) return d;
      env.balance += amount;
      d.transactions.unshift({
        id: uid(), type: "deposit", envId, envName: env.name, amount, memo: memo || "",
        date: new Date().toISOString(),
      });
      return d;
    });

  const budgetWithdraw = (envId, amount, memo) =>
    update((d) => {
      const env = d.envelopes.find((e) => e.id === envId);
      if (!env) return d;
      env.balance -= amount;
      d.transactions.unshift({
        id: uid(), type: "withdraw", envId, envName: env.name, amount, memo: memo || "",
        date: new Date().toISOString(),
      });
      return d;
    });

  const settleCard = (envId, amount, memo) =>
    update((d) => {
      const env = d.envelopes.find((e) => e.id === envId);
      if (!env) return d;
      env.balance -= amount;
      d.transactions.unshift({
        id: uid(), type: "settle", envId, envName: env.name, amount, memo: memo || "",
        date: new Date().toISOString(),
      });
      return d;
    });

  // ---------- 操作: 購入(予算封筒 → カード封筒への移動) ----------
  const recordPurchase = (fromEnvId, toEnvId, cost, moved, memo, dateStr) =>
    update((d) => {
      const from = d.envelopes.find((e) => e.id === fromEnvId);
      const to = d.envelopes.find((e) => e.id === toEnvId);
      if (!from || !to) return d;
      const date = dateStr ? new Date(dateStr + "T12:00:00").toISOString() : new Date().toISOString();
      from.balance -= moved;
      to.balance += moved;
      const pid = uid();
      d.purchases.unshift({
        id: pid, fromEnvId, toEnvId, fromName: from.name, toName: to.name,
        cost, moved, memo, date,
      });
      d.transactions.unshift({
        id: uid(), type: "purchase", purchaseId: pid, fromEnvId, toEnvId, fromName: from.name, toName: to.name,
        amount: moved, cost, memo, date,
      });
      const diff = moved - cost;
      if (diff !== 0) {
        d.adjustments.unshift({
          id: uid(),
          purchaseId: pid,
          fromEnvId: diff > 0 ? toEnvId : fromEnvId,
          toEnvId: diff > 0 ? fromEnvId : toEnvId,
          fromName: diff > 0 ? to.name : from.name,
          toName: diff > 0 ? from.name : to.name,
          amount: Math.abs(diff),
          memo,
          date,
          done: false,
        });
      }
      return d;
    });

  const removePurchase = (pid) =>
    update((d) => {
      const p = d.purchases.find((x) => x.id === pid);
      if (!p) return d;
      const from = d.envelopes.find((e) => e.id === p.fromEnvId);
      const to = d.envelopes.find((e) => e.id === p.toEnvId);
      const adj = d.adjustments.find((a) => a.purchaseId === pid);
      if (adj) {
        if (adj.done) {
          const af = d.envelopes.find((e) => e.id === adj.fromEnvId);
          const at = d.envelopes.find((e) => e.id === adj.toEnvId);
          if (af) af.balance += adj.amount;
          if (at) at.balance -= adj.amount;
        }
        d.adjustments = d.adjustments.filter((a) => a.id !== adj.id);
      }
      if (from) from.balance += p.moved;
      if (to) to.balance -= p.moved;
      d.purchases = d.purchases.filter((x) => x.id !== pid);
      return d;
    });

  // ---------- 操作: 要調整の解消 ----------
  const resolveAdjustment = (adjId) =>
    update((d) => {
      const adj = d.adjustments.find((a) => a.id === adjId && !a.done);
      if (!adj) return d;
      const from = d.envelopes.find((e) => e.id === adj.fromEnvId);
      const to = d.envelopes.find((e) => e.id === adj.toEnvId);
      adj.done = true;
      adj.doneDate = new Date().toISOString();
      if (from) from.balance -= adj.amount;
      if (to) to.balance += adj.amount;
      d.transactions.unshift({
        id: uid(), type: "adjust", fromEnvId: adj.fromEnvId, toEnvId: adj.toEnvId,
        fromName: adj.fromName, toName: adj.toName, amount: adj.amount,
        date: new Date().toISOString(),
      });
      return d;
    });

  const editTransaction = (txId, amount, memo) =>
    update((d) => {
      const t = d.transactions.find((x) => x.id === txId);
      if (!t) return d;
      const env = d.envelopes.find((e) => e.id === t.envId);
      if (env) {
        if (t.type === "deposit") env.balance += amount - t.amount;
        if (t.type === "withdraw" || t.type === "settle") env.balance -= amount - t.amount;
      }
      t.amount = amount;
      t.memo = memo;
      return d;
    });

  const updatePurchaseMemo = (purchaseId, memo) =>
    update((d) => {
      const p = d.purchases.find((x) => x.id === purchaseId);
      if (p) p.memo = memo;
      const t = d.transactions.find((x) => x.type === "purchase" && x.purchaseId === purchaseId);
      if (t) t.memo = memo;
      const adj = d.adjustments.find((x) => x.purchaseId === purchaseId);
      if (adj) adj.memo = memo;
      return d;
    });

  const resetAll = async () => {
    setData(EMPTY);
    setConfirmReset(false);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(EMPTY));
    } catch (e) {
      console.error(e);
    }
  };

  if (!data) {
    return (
      <div style={{ minHeight: "100vh", background: C.paper, display: "flex",
        alignItems: "center", justifyContent: "center", color: C.inkSoft,
        fontFamily: "'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif" }}>
        読み込み中…
      </div>
    );
  }

  const openAdjust = data.adjustments.filter((a) => !a.done);
  const adjustTotal = openAdjust.reduce((s, a) => s + a.amount, 0);

  return (
    <div className="fw-root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
        .fw-root {
          min-height: 100vh; background: ${C.paper}; color: ${C.ink};
          font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', 'Yu Gothic', sans-serif;
          -webkit-font-smoothing: antialiased;
        }
        .fw-wrap { max-width: 440px; margin: 0 auto; padding: 20px 16px 48px; }
        .fw-title {
          font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
          font-size: 22px; font-weight: 700; letter-spacing: 0.14em; margin: 0;
        }
        .fw-sub { font-size: 11px; color: ${C.inkSoft}; letter-spacing: 0.08em; margin-top: 2px; }
        .mono { font-family: 'IBM Plex Mono', 'Menlo', monospace; font-variant-numeric: tabular-nums; }

        .fw-alert {
          margin-top: 14px; border-radius: 10px; padding: 12px 14px; display: flex;
          align-items: center; gap: 12px; cursor: pointer; width: 100%; text-align: left;
        }
        .fw-alert.shu { border: 1.5px solid ${C.shu}; background: ${C.shuBg}; }
        .fw-stamp {
          width: 44px; height: 44px; border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 11px;
          line-height: 1.15; text-align: center; flex-shrink: 0; transform: rotate(-6deg);
        }
        .fw-stamp.shu { border: 2px solid ${C.shu}; color: ${C.shu}; }

        .fw-tabs { display: flex; gap: 2px; margin-top: 18px; border-bottom: 1.5px solid ${C.line}; }
        .fw-tab {
          background: none; border: none; padding: 8px 8px 10px; font-size: 13.5px;
          color: ${C.inkSoft}; cursor: pointer; font-family: inherit; font-weight: 500;
          border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; white-space: nowrap;
        }
        .fw-tab.on { color: ${C.ink}; font-weight: 700; border-bottom-color: ${C.ink}; }
        .fw-badge {
          display: inline-block; min-width: 17px; padding: 0 4px; margin-left: 3px;
          color: #fff; border-radius: 9px; font-size: 10.5px; line-height: 17px; font-weight: 700;
        }
        .fw-badge.shu { background: ${C.shu}; }

        .env-card {
          position: relative; margin-top: 16px; background: ${C.kraft};
          border: 1px solid ${C.kraftLine}; border-radius: 8px; overflow: hidden;
          box-shadow: 0 1px 3px rgba(60,50,30,0.12);
        }
        .env-card .env-flap {
          height: 26px; background: ${C.kraftDeep};
          clip-path: polygon(0 0, 100% 0, 50% 100%); opacity: 0.55;
        }
        .env-card.card { background: ${C.card}; border-color: ${C.cardLine}; }
        .env-card.card .env-flap { background: ${C.cardDeep}; }
        .env-body { padding: 6px 16px 14px; }
        .env-name {
          font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700;
          letter-spacing: 0.06em;
        }
        .env-amount { font-size: 26px; font-weight: 600; margin-top: 4px; }
        .env-row { display: flex; align-items: baseline; justify-content: space-between; }
        .env-note-shu { font-size: 12px; color: ${C.shu}; font-weight: 700; margin-top: 4px; }
        .env-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .btn {
          font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
          border-radius: 7px; padding: 8px 14px; border: 1.5px solid ${C.ink};
          background: ${C.white}; color: ${C.ink};
        }
        .btn.primary { background: ${C.ink}; color: ${C.white}; }
        .btn.shu { border-color: ${C.shu}; color: ${C.shu}; background: ${C.white}; }
        .btn.ghost { border-color: transparent; background: transparent; color: ${C.inkSoft}; padding: 8px 6px; }
        .btn:disabled { opacity: 0.4; cursor: default; }

        .list-item {
          background: ${C.white}; border: 1px solid ${C.line}; border-radius: 10px;
          padding: 12px 14px; margin-top: 10px;
        }
        .li-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
        .li-name { font-weight: 700; font-size: 14px; }
        .li-date { font-size: 11px; color: ${C.inkSoft}; }
        .li-memo { font-size: 12px; color: ${C.inkSoft}; margin-top: 4px; }
        .amt-in { color: ${C.green}; }
        .amt-out { color: ${C.ink}; }
        .amt-ret { color: ${C.shu}; }
        .amt-card { color: ${C.blue}; }

        .section-label { margin-top: 24px; font-size: 12px; font-weight: 700; color: ${C.inkSoft}; }
        .empty {
          margin-top: 14px; text-align: center; color: ${C.inkSoft}; font-size: 13px;
          line-height: 1.9;
        }

        .overlay {
          position: fixed; inset: 0; background: rgba(30,30,25,0.45);
          display: flex; align-items: flex-end; justify-content: center; z-index: 50;
        }
        .sheet {
          background: ${C.paper}; width: 100%; max-width: 440px;
          border-radius: 16px 16px 0 0; padding: 20px 18px 28px;
          max-height: 88vh; overflow-y: auto;
        }
        .sheet h2 {
          font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700;
          margin: 0 0 4px; letter-spacing: 0.08em;
        }
        .sheet .env-of { font-size: 12px; color: ${C.inkSoft}; margin-bottom: 10px; line-height: 1.6; }
        .field { margin-top: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 700; color: ${C.inkSoft}; margin-bottom: 6px; }
        .field input, .field select {
          width: 100%; box-sizing: border-box; font-size: 20px; padding: 10px 12px;
          border: 1.5px solid ${C.line}; border-radius: 8px; background: ${C.white};
          color: ${C.ink}; font-family: 'IBM Plex Mono', monospace;
        }
        .field input[type=text], .field input[type=date], .field select { font-family: inherit; font-size: 16px; }
        .field input:focus, .field select:focus { outline: 2px solid ${C.ink}; outline-offset: 1px; }
        .quick { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .chip {
          font-family: inherit; font-size: 12px; font-weight: 700; padding: 6px 10px;
          border-radius: 999px; border: 1.5px solid ${C.line}; background: ${C.white};
          color: ${C.ink}; cursor: pointer;
        }
        .chip.on { border-color: ${C.ink}; background: ${C.ink}; color: ${C.white}; }
        .note-shu {
          margin-top: 14px; border: 1.5px dashed ${C.shu}; background: ${C.shuBg};
          color: ${C.shu}; border-radius: 8px; padding: 10px 12px; font-size: 13px;
          font-weight: 700; line-height: 1.6;
        }
        .note-ok {
          margin-top: 14px; border: 1.5px dashed ${C.green}; background: ${C.greenBg};
          color: ${C.green}; border-radius: 8px; padding: 10px 12px; font-size: 13px;
          font-weight: 700;
        }
        .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
        .sheet-actions .btn { flex: 1; padding: 12px; font-size: 15px; }

        .footer { margin-top: 40px; text-align: center; }
        .footer button {
          background: none; border: none; color: ${C.inkSoft}; font-size: 11px;
          text-decoration: underline; cursor: pointer; font-family: inherit;
        }
        @media (prefers-reduced-motion: no-preference) {
          .sheet { animation: up 0.18s ease-out; }
          @keyframes up { from { transform: translateY(24px); opacity: 0.6; } to { transform: none; opacity: 1; } }
        }
      `}</style>

      <div className="fw-wrap">
        <header>
          <h1 className="fw-title">袋分け帳</h1>
          <div className="fw-sub">予算封筒とカード封筒に分けて、移し忘れ・戻し忘れを防ぐ</div>
        </header>

        {adjustTotal > 0 && (
          <button className="fw-alert shu" onClick={() => setTab("adjust")}>
            <div className="fw-stamp shu">要<br />調整</div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.shu }}>移し過ぎ・移し足りない分があります</div>
              <div className="mono" style={{ fontSize: 20, fontWeight: 600, color: C.shu }}>
                {yen(adjustTotal)}
                <span style={{ fontSize: 12, marginLeft: 6 }}>({openAdjust.length}件)</span>
              </div>
            </div>
          </button>
        )}

        <nav className="fw-tabs">
          <button className={`fw-tab ${tab === "envelopes" ? "on" : ""}`} onClick={() => setTab("envelopes")}>封筒</button>
          <button className={`fw-tab ${tab === "purchases" ? "on" : ""}`} onClick={() => setTab("purchases")}>購入記録</button>
          <button className={`fw-tab ${tab === "adjust" ? "on" : ""}`} onClick={() => setTab("adjust")}>
            要調整{openAdjust.length > 0 && <span className="fw-badge shu">{openAdjust.length}</span>}
          </button>
          <button className={`fw-tab ${tab === "history" ? "on" : ""}`} onClick={() => setTab("history")}>履歴</button>
        </nav>

        {tab === "envelopes" && (
          <EnvelopeTab
            data={data}
            onAddBudget={() => setModal({ type: "addEnv", group: "budget" })}
            onAddCard={() => setModal({ type: "addEnv", group: "card" })}
            onDeposit={(envId) => setModal({ type: "deposit", envId })}
            onWithdraw={(envId) => setModal({ type: "withdraw", envId })}
            onUse={(envId) => setModal({ type: "purchase", fromEnvId: envId })}
            onSettle={(envId) => setModal({ type: "settle", envId })}
            onDelete={(envId) => setModal({ type: "deleteEnv", envId })}
            onEdit={(envId) => setModal({ type: "editEnv", envId })}
          />
        )}

        {tab === "purchases" && (
          <PurchasesTab
            data={data}
            onAdd={() => setModal({ type: "purchase" })}
            onRemove={removePurchase}
            onEditMemo={(purchaseId) => setModal({ type: "editPurchaseMemo", purchaseId })}
          />
        )}

        {tab === "adjust" && <AdjustTab data={data} onResolve={resolveAdjustment} />}
        {tab === "history" && (
          <HistoryTab
            data={data}
            onEdit={(t) => setModal(
              t.type === "purchase"
                ? { type: "editPurchaseMemo", purchaseId: t.purchaseId }
                : { type: "editTx", txId: t.id }
            )}
          />
        )}

        <div className="footer">
          {!confirmReset ? (
            <button onClick={() => setConfirmReset(true)}>データをリセット</button>
          ) : (
            <span style={{ fontSize: 12, color: C.shu }}>
              全データを消します。よろしいですか?{" "}
              <button style={{ color: C.shu, fontWeight: 700 }} onClick={resetAll}>消す</button>{" "}
              <button onClick={() => setConfirmReset(false)}>やめる</button>
            </span>
          )}
        </div>
      </div>

      {modal?.type === "addEnv" && (
        <AddEnvSheet
          group={modal.group}
          onClose={() => setModal(null)}
          onSave={(name) => { addEnvelope(name, modal.group); setModal(null); }}
        />
      )}
      {modal?.type === "purchase" && (
        <PurchaseSheet
          envelopes={data.envelopes}
          presetFromId={modal.fromEnvId}
          onClose={() => setModal(null)}
          onSave={(fromEnvId, toEnvId, cost, moved, memo, dateStr) => {
            recordPurchase(fromEnvId, toEnvId, cost, moved, memo, dateStr);
            setModal(null);
          }}
        />
      )}
      {modal?.type === "deposit" && (
        <AmountSheet
          title="入金"
          hint={`「${data.envelopes.find((e) => e.id === modal.envId)?.name}」の予算封筒に入金します`}
          memoPlaceholder="例: 給料日の積み立て"
          onClose={() => setModal(null)}
          onSave={(amount, memo) => { budgetDeposit(modal.envId, amount, memo); setModal(null); }}
        />
      )}
      {modal?.type === "withdraw" && (
        <AmountSheet
          title="出金"
          hint={`「${data.envelopes.find((e) => e.id === modal.envId)?.name}」の予算封筒から現金で使います(残高 ${yen(data.envelopes.find((e) => e.id === modal.envId)?.balance)})`}
          memoPlaceholder="例: 現金で買い物"
          onClose={() => setModal(null)}
          onSave={(amount, memo) => { budgetWithdraw(modal.envId, amount, memo); setModal(null); }}
        />
      )}
      {modal?.type === "settle" && (
        <AmountSheet
          title="引き落とし確定"
          hint={`「${data.envelopes.find((e) => e.id === modal.envId)?.name}」から銀行口座へ移した(引き落とされた)分を確定します`}
          memoPlaceholder="例: 7月分引き落とし"
          defaultAmount={data.envelopes.find((e) => e.id === modal.envId)?.balance || 0}
          onClose={() => setModal(null)}
          onSave={(amount, memo) => { settleCard(modal.envId, amount, memo); setModal(null); }}
        />
      )}
      {modal?.type === "deleteEnv" && (
        <DeleteSheet
          env={data.envelopes.find((e) => e.id === modal.envId)}
          onClose={() => setModal(null)}
          onDelete={() => { deleteEnvelope(modal.envId); setModal(null); }}
        />
      )}
      {modal?.type === "editEnv" && (
        <EditEnvSheet
          env={data.envelopes.find((e) => e.id === modal.envId)}
          onClose={() => setModal(null)}
          onSave={(name, balance) => { editEnvelope(modal.envId, name, balance); setModal(null); }}
        />
      )}
      {modal?.type === "editPurchaseMemo" && (() => {
        const p = data.purchases.find((x) => x.id === modal.purchaseId);
        if (!p) return null;
        return (
          <MemoSheet
            title="メモを編集"
            hint={`「${p.fromName} → ${p.toName}」(${yen(p.cost)})の購入記録のメモを修正します`}
            defaultMemo={p.memo}
            onClose={() => setModal(null)}
            onSave={(memo) => { updatePurchaseMemo(modal.purchaseId, memo); setModal(null); }}
          />
        );
      })()}
      {modal?.type === "editTx" && (() => {
        const tx = data.transactions.find((t) => t.id === modal.txId);
        if (!tx) return null;
        const titleMap = { deposit: "入金を修正", withdraw: "出金を修正", settle: "引き落とし確定を修正" };
        return (
          <AmountSheet
            title={titleMap[tx.type] || "修正"}
            hint={`「${tx.envName}」の記録を修正します`}
            defaultAmount={tx.amount}
            defaultMemo={tx.memo}
            confirmLabel="修正する"
            onClose={() => setModal(null)}
            onSave={(amount, memo) => { editTransaction(modal.txId, amount, memo); setModal(null); }}
          />
        );
      })()}
    </div>
  );
}

// ---------- 封筒タブ ----------

  const budgetEnvs = data.envelopes.filter((e) => e.group === "budget");
  const cardEnvs = data.envelopes.filter((e) => e.group === "card");
  const adjustFor = (envId) =>
    data.adjustments.filter((a) => !a.done && (a.fromEnvId === envId || a.toEnvId === envId))
      .reduce((s, a) => s + a.amount, 0);

  return (
    <div>
      <div className="section-label" style={{ marginTop: 18, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

        <div className="empty">まだありません。「食費」「雑費」「お小遣い」など、使う予算ごとに追加しましょう。</div>

          <div className="env-card" key={env.id}>
            <div className="env-flap" />
            <div className="env-body">
              <div className="env-row">
                <div className="env-name">{env.name}</div>
                <div>
                  <button className="btn ghost" onClick={() => onEdit(env.id)} aria-label={`${env.name}を編集`}>編集</button>
                  <button className="btn ghost" onClick={() => onDelete(env.id)} aria-label={`${env.name}を削除`}>削除</button>
                </div>
              </div>
              <div className="env-amount mono">{yen(env.balance)}</div>
              {adj > 0 && <div className="env-note-shu">要調整 {yen(adj)}</div>}
              <div className="env-actions">
                <button className="btn primary" onClick={() => onDeposit(env.id)}>入金</button>

        <span>カード・引き落とし封筒</span>
        <button className="btn" style={{ fontSize: 12, padding: "5px 10px" }} onClick={onAddCard}>+ 追加</button>
      </div>
      {cardEnvs.length === 0 && (
        <div className="empty">まだありません。「auカード」「ゆうちょ銀行」など、引き落とし先ごとに追加しましょう。</div>
      )}
      {cardEnvs.map((env) => {
        const adj = adjustFor(env.id);
        return (
          <div className="env-card card" key={env.id}>
            <div className="env-flap" />
            <div className="env-body">
              <div className="env-row">
                <div className="env-name">{env.name}</div>
                <div>
                  <button className="btn ghost" onClick={() => onEdit(env.id)} aria-label={`${env.name}を編集`}>編集</button>
                  <button className="btn ghost" onClick={() => onDelete(env.id)} aria-label={`${env.name}を削除`}>削除</button>
                </div>
              </div>
              <div className="env-amount mono">{yen(env.balance)}</div>
              {adj > 0 && <div className="env-note-shu">要調整 {yen(adj)}</div>}
              <div className="env-actions">
                <button className="btn primary" onClick={() => onSettle(env.id)}>引き落とし確定</button>
              </div>
            </div>

}

// ---------- シート: 購入を記録(予算封筒 → カード封筒) ----------
function PurchaseSheet({ envelopes, presetFromId, onClose, onSave }) {
  const budgetEnvs = envelopes.filter((e) => e.group === "budget");
  const cardEnvs = envelopes.filter((e) => e.group === "card");

  const [fromEnvId, setFromEnvId] = useState(presetFromId || (budgetEnvs.length === 1 ? budgetEnvs[0].id : ""));
  const [toEnvId, setToEnvId] = useState(cardEnvs.length === 1 ? cardEnvs[0].id : "");
  const [dateStr, setDateStr] = useState(todayStr());
  const [memo, setMemo] = useState("");
  const [cost, setCost] = useState("");
  const [moved, setMoved] = useState("");
  const [mode, setMode] = useState("just");

  if (budgetEnvs.length === 0 || cardEnvs.length === 0) {
    return (
      <Sheet onClose={onClose}>
        <h2>購入を記録</h2>
        <div className="env-of">
          先に「封筒」タブで、予算封筒(食費など)とカード封筒(auカードなど)を1つずつ作ってください。
        </div>
        <div className="sheet-actions">
          <button className="btn primary" onClick={onClose}>わかった</button>
        </div>
      </Sheet>
    );
  }

  const c = parseInt(cost, 10) || 0;
  const m = parseInt(moved, 10) || 0;

  const applyMode = (mm, base) => {
    const v = base ?? c;
    setMode(mm);
    if (mm === "just") setMoved(v ? String(v) : "");
    if (mm === "sen") setMoved(v ? String(Math.ceil(v / 1000) * 1000) : "");
    if (mm === "man") setMoved(v ? String(Math.ceil(v / 10000) * 10000) : "");
  };

  const onCostChange = (val) => {
    setCost(val);
    if (mode !== "free") applyMode(mode, parseInt(val, 10) || 0);
  };

  const diff = m - c;
  const fromName = budgetEnvs.find((e) => e.id === fromEnvId)?.name || "予算封筒";
  const toName = cardEnvs.find((e) => e.id === toEnvId)?.name || "カード封筒";
  const valid = c > 0 && m > 0 && fromEnvId && toEnvId && memo.trim();
  const missing = [];
  if (!(c > 0)) missing.push("いくら(購入額)");
  if (!(m > 0)) missing.push("実際に移す額");
  if (!fromEnvId) missing.push("どの予算封筒から");
  if (!toEnvId) missing.push("どのカード封筒へ");
  if (!memo.trim()) missing.push("何をどこで買った");

  return (
    <Sheet onClose={onClose}>
      <h2>購入を記録</h2>
      <div className="env-of">クレカで買ったら、その場で記録。使った予算封筒からカード封筒へお金を移します。</div>

      <div className="field">
        <label>いつ</label>
        <input type="date" value={dateStr} onChange={(e) => setDateStr(e.target.value)} />
      </div>

      <div className="field">
        <label>何をどこで買った</label>
        <input type="text" value={memo} placeholder="例: 〇〇スーパーで食材"
          onChange={(e) => setMemo(e.target.value)} />
      </div>

      <div className="field">
        <label>いくら(購入額)</label>
        <input type="number" inputMode="numeric" value={cost} placeholder="8500"
          onChange={(e) => onCostChange(e.target.value)} onWheel={(e) => e.target.blur()} />
      </div>

      <div className="field">
        <label>どの予算封筒から</label>
        <div className="quick">
          {budgetEnvs.map((env) => (
            <button key={env.id} className={`chip ${fromEnvId === env.id ? "on" : ""}`}
              onClick={() => setFromEnvId(env.id)}>{env.name}</button>
          ))}
        </div>
      </div>

      <div className="field">
        <label>どのカード封筒へ</label>
        <div className="quick">
          {cardEnvs.map((env) => (
            <button key={env.id} className={`chip ${toEnvId === env.id ? "on" : ""}`}
              onClick={() => setToEnvId(env.id)}>{env.name}</button>
          ))}
        </div>
      </div>

      <div className="field">
        <label>実際に移す額(丸めてOK)</label>
        <div className="quick">
          <button className={`chip ${mode === "just" ? "on" : ""}`} onClick={() => applyMode("just")}>購入額ぴったり</button>
          <button className={`chip ${mode === "sen" ? "on" : ""}`} onClick={() => applyMode("sen")}>千円単位</button>
          <button className={`chip ${mode === "man" ? "on" : ""}`} onClick={() => applyMode("man")}>一万円単位</button>
        </div>
        <div style={{ marginTop: 8 }}>
          <input type="number" inputMode="numeric" value={moved} placeholder="8500"
            onChange={(e) => { setMode("free"); setMoved(e.target.value); }} onWheel={(e) => e.target.blur()} />
        </div>
      </div>

      {c > 0 && m > 0 && diff > 0 && (
        <div className="note-shu">
          購入額より {yen(diff)} 多く移すので、あとで「{toName} → {fromName}」に {yen(diff)} 戻す調整が「要調整」に登録されます。
        </div>
      )}
      {c > 0 && m > 0 && diff < 0 && (
        <div className="note-shu">
          購入額より {yen(-diff)} 少なく移すので、あとで「{fromName} → {toName}」に追加で {yen(-diff)} 移す調整が「要調整」に登録されます。
        </div>
      )}
      {c > 0 && m > 0 && diff === 0 && (
        <div className="note-ok">ぴったりです。調整は発生しません。</div>
      )}

      {!valid && (
        <div style={{ marginTop: 10, fontSize: 12, color: C.inkSoft, textAlign: "center" }}>
          未入力: {missing.join(" / ")}
        </div>
      )}

      <div className="sheet-actions">
        <button className="btn ghost" onClick={onClose}>やめる</button>
        <button className="btn primary" disabled={!valid}
          onClick={() => onSave(fromEnvId, toEnvId, c, m, memo.trim(), dateStr)}>
          記録する
        </button>
      </div>
    </Sheet>
  );
}

// ---------- シート: 金額入力(入金/出金/引き落とし確定 共通) ----------

// ---------- シート: 封筒を編集(名前・残高) ----------
function EditEnvSheet({ env, onClose, onSave }) {
  const [name, setName] = useState(env?.name || "");
  const [balance, setBalance] = useState(env ? String(env.balance) : "0");
  const b = parseInt(balance, 10) || 0;
  const changed = b !== (env?.balance || 0);

  return (
    <Sheet onClose={onClose}>
      <h2>封筒を編集</h2>
      <div className="field">
        <label>封筒の名前</label>
        <input type="text" value={name} onChange={(e) => setName(e.target.value)} autoFocus />
      </div>
      <div className="field">
        <label>残高</label>
        <input type="number" inputMode="numeric" value={balance}
          onChange={(e) => setBalance(e.target.value)} onWheel={(e) => e.target.blur()} />
      </div>
      {changed && (
        <div className="note-shu">
          残高を {yen(env?.balance)} → {yen(b)} に直接書き換えます。差額は履歴に記録されます。
        </div>
      )}
      <div className="sheet-actions">
        <button className="btn ghost" onClick={onClose}>やめる</button>
        <button className="btn primary" disabled={!name.trim()} onClick={() => onSave(name.trim(), b)}>保存する</button>
      </div>
    </Sheet>
  );
}

// ---------- シート: 削除確認 ----------
function DeleteSheet({ env, onClose, onDelete }) {
  return (
    <Sheet onClose={onClose}>
      <h2>封筒を削除</h2>
      <div className="env-of">
        「{env?.name}」(残高 {yen(env?.balance)})を削除します。履歴・購入記録は残りますが、この封筒に関わる未解消の「要調整」は消えます。
      </div>
      <div className="sheet-actions">
        <button className="btn ghost" onClick={onClose}>やめる</button>
        <button className="btn shu" onClick={onDelete}>削除する</button>
      </div>
    </Sheet>
  );
}

// ---------- 共通シート ----------
function Sheet({ children, onClose }) {
  return (
    <div className="overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet" role="dialog" aria-modal="true">{children}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FukuroWake />);
</script>

<script>
  // 手動でBabel変換する。自動処理(data-presets)だとreactプリセットの
  // 既定であるautomatic JSXランタイムが使われ、UMD版Reactでは
  // "react/jsx-runtime"を解決できずimport文が残ってしまうため、
  // classicランタイムを明示して変換する。
  (function () {
    const src = document.getElementById("app-source").textContent;
    const { code } = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]],
    });
    const script = document.createElement("script");
    script.textContent = code;
    document.body.appendChild(script);
  })();
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js");
    });
  }
</script>
</body>
</html>
